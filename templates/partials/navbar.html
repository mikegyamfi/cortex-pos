{% load static %}
<nav class="bg-white p-3 layout-navbar container-xxl navbar-detached navbar navbar-expand-xl align-items-center bg-navbar-theme" id="layout-navbar">
    <div class="layout-menu-toggle navbar-nav align-items-xl-center me-4 me-xl-0 d-xl-none">
      <a class="nav-item nav-link px-0 me-xl-6" href="javascript:void(0)">
        <i class="icon-base ri ri-menu-line icon-md"></i>
      </a>
    </div>

    <div class="navbar-nav-right d-flex align-items-center justify-content-end" id="navbar-collapse">

      <!-- Current Location Badge -->
      {% if user.is_authenticated and user.assigned_location %}
      <div class="navbar-nav align-items-center">
        <span class="badge p-3 bg-label-primary">
            <i class="ri ri-store-2-line me-1"></i> {{ user.assigned_location.name }}
        </span>
      </div>
      {% endif %}

      <ul class="navbar-nav flex-row align-items-center ms-md-auto">
        <!-- User -->
        <li class="nav-item navbar-dropdown dropdown-user dropdown">
          <a class="nav-link dropdown-toggle hide-arrow p-0" href="javascript:void(0);" data-bs-toggle="dropdown">
            <div class="avatar avatar-online">
                <!-- Fallback to default avatar if no profile image -->
                <img src="{% static 'assets/img/avatars/1.png' %}" alt class="rounded-circle" />
            </div>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" href="#">
                <div class="d-flex">
                  <div class="flex-shrink-0 me-3">
                    <div class="avatar avatar-online">
                      <img src="{% static 'assets/img/avatars/1.png' %}" alt class="w-px-40 h-auto rounded-circle" />
                    </div>
                  </div>
                  <div class="flex-grow-1">
                    <h6 class="mb-0">{{ user.username }}</h6>
                    <small class="text-body-secondary">{{ user.get_role_display|default:"Staff" }}</small>
                  </div>
                </div>
              </a>
            </li>
            <li><div class="dropdown-divider my-1"></div></li>
            <li>
              <a class="dropdown-item" href="{% url 'users:password_change' %}">
                <i class="icon-base ri ri-lock-password-line icon-md me-3"></i>
                <span>Change Password</span>
              </a>
            </li>
            <li><div class="dropdown-divider my-1"></div></li>
            <li>
              <div class="d-grid px-4 pt-2 pb-1">
                <!-- Form for Logout (Best Practice for Django) -->
                <form action="{% url 'users:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger d-flex w-100 justify-content-center">
                        <small class="align-middle">Logout</small>
                        <i class="ri ri-logout-box-r-line ms-2 ri-xs"></i>
                    </button>
                </form>
              </div>
            </li>
          </ul>
        </li>
        <!--/ User -->
      </ul>
    </div>
</nav>
