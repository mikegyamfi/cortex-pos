{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | Cortex POS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header border-bottom"><h5 class="mb-0">{{ title }}</h5></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary"><i class="ri ri-save-line me-1"></i> Save</button>
                        <a href="{% url 'location:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
