{% load static %}
{% load crispy_forms_tags %}
<!doctype html>
<html lang="en" class="layout-wide customizer-hide" data-assets-path="{% static 'assets/' %}" data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password | Retail POS</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'assets/img/favicon/favicon.ico' %}" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="{% static 'assets/vendor/css/core.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/vendor/css/theme-default.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/css/demo.css' %}" />

    <!-- Auth Page CSS -->
    <link rel="stylesheet" href="{% static 'assets/vendor/css/pages/page-auth.css' %}" />
  </head>

  <body>
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner py-6 mx-4">
            <!-- Logo -->
            <div class="app-brand justify-content-center mb-4">
                <a href="#" class="app-brand-link gap-3">
                    <span class="app-brand-text demo text-heading fw-semibold">Retail POS</span>
                </a>
            </div>
            <!-- /Logo -->

            <div class="card p-sm-7 p-2">
                <div class="card-body mt-1">
                    <h4 class="mb-1">Change Password 🔒</h4>
                    <p class="mb-5">For security reasons, you must change your temporary password before continuing.</p>

                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mb-3 mt-4">
                            <button class="btn btn-primary d-grid w-100" type="submit">Set New Password</button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <form action="{% url 'users:logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link p-0 text-muted">
                                <i class="ri-logout-box-r-line me-1"></i> Log out
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core JS -->
    <script src="{% static 'assets/vendor/libs/jquery/jquery.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/popper/popper.js' %}"></script>
    <script src="{% static 'assets/vendor/js/bootstrap.js' %}"></script>
  </body>
</html>
