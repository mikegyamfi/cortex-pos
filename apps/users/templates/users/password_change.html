{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Change Password | Retail POS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header border-bottom">
                <h5 class="mb-0"><i class="ri ri-lock-password-line me-2"></i>Change Your Password</h5>
            </div>
            <div class="card-body pt-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2 mt-4">
                        <button class="btn btn-primary" type="submit">
                            <i class="ri ri-save-line me-1"></i> Update Password
                        </button>
                        <a href="{% url 'dashboard:index' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
